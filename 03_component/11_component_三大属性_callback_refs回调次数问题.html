<!DOCTYPE html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <!-- 引入 React 和 Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js" ></script>
    <!-- 引入PropTypes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.7.2/prop-types.min.js"></script>
   
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        class Person extends React.Component { 
            state = {
                name: "Tom",
                age: 18
            }
            showInputValue = ()=>{
                 const {input} = this
                 alert(input.value)
                 // alert(this.refs.input.value) --- IGNORE ---
            }
            addAge = ()=>{
                this.setState({age: this.state.age + 1})
            }
            render() {
                
                return (
                    <div>
                        <h2>姓名：{this.state.name}</h2>
                        <h2>年龄：{this.state.age}</h2>
                        {/* console.log(input)} 组件的每次更新，这里会回调两次，第一次是null，第二次是真实的组件，比如点击增加年龄 */}
                        <input type="text" ref={input => {this.input = input; console.log(input)}} placeholder="请输入内容"/>
                        <button onClick={this.showInputValue}>Show Input Value</button>
                        <button onClick={this.addAge}>年龄+1</button>
                    </div> 
                )
             }
        }    
    
        ReactDOM.render(<Person/>,document.getElementById('root'))

    </script>
</body>
</html>
