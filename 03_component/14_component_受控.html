<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title></title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.7.2/prop-types.min.js"></script>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        /*
         非受控组件：ref直接获取DOM元素的值，适用于表单输入等场景
         受控组件：通过state管理组件的值，适用于需要实时验证或者需要根据输入值进行其他操作的场景
         选择使用哪种方式取
        */
        class Login extends React.Component {
            state = {
                username: '',
                password: ''
            }
            handleClick = (event) => {
                const { username, password } = this.state
                alert(`Username: ${username}, Password: ${password}`);
            }
            changeUsername = (event) => {
                this.setState({ username: event.target.value })
            }
            changePassword = (event) => {
                this.setState({ password: event.target.value })
            }
            render() {
                return (
                    <div>
                        <div>
                            <h2>Login Component</h2>
                        </div>
                        <div>
                            <label htmlFor="username">Username:</label>
                            <input type="text" id="username" name="username" onChange={this.changeUsername} />
                            <label htmlFor="password">Password:</label>
                            <input type="password" id="password" name="password" onChange={this.changePassword} />
                            <button onClick={this.handleClick}>Login</button>
                        </div>
                    </div>
                )
            }
        }

        ReactDOM.render(<Login />, document.getElementById('root'))
    </script>
</body>

</html>
