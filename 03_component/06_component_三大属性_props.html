<!DOCTYPE html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js" ></script>
   
</head>
<body>
    <div id="root"></div>
    <div id="root1"></div>
    <div id="root2"></div>
    <script type="text/babel">
        class Weather extends React.Component {
            render() {
                const {day, temp, wind} = this.props 
                return (
                    <ul>
                      <li>日期: {day}</li>
                      <li>温度: {temp}</li>
                      <li>风向: {wind}</li>    
                    </ul>
                )
            }

        }
        ReactDOM.render(<Weather day="2026-02-28"  temp="2-10" wind="东风2-3级"/>,document.getElementById('root'))
        ReactDOM.render(<Weather day="2026-03-01"  temp="2-11" wind="西风5-7级"/>,document.getElementById('root1'))
        let weatherInfo = {day:"2026-03-02", temp:"3-12", wind:"南风3-4级"}
        ReactDOM.render(<Weather {...weatherInfo}/>,document.getElementById('root2'))
    </script>
</body>
</html>
