<!DOCTYPE html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <!-- 引入 React 和 Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js" ></script>
    <!-- 引入PropTypes -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.7.2/prop-types.min.js"></script>
   
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        class Person extends React.Component { 
            /*
                React.createRef()调用后返回一个容器对象，这个对象有一个current属性，初始值为null。
                当这个ref被附加到一个组件上时，current属性就会指向这个组件的实例。
            */   
            nameRef = React.createRef()
            ageRef = React.createRef()
            showInputValue = ()=>{
                 const {current} = this.nameRef
                 const {current: ageCurrent} = this.ageRef
                 alert(`名字：${current.value}，年龄：${ageCurrent.value}`)
            }
            render() {
                
                return (
                    <div>
                        <input type="text" ref={this.nameRef} placeholder="请输入名字"/>
                        <input type="text" ref={this.ageRef} placeholder="请输入年龄"/>
                        <button onClick={this.showInputValue}>Show Input Value</button>

                    </div> 
                )
             }
        }    
    
        ReactDOM.render(<Person/>,document.getElementById('root'))

    </script>
</body>
</html>
