<body>
    <!--[if lt IE 7]>

    <script src="" async defer></script>
    
    <div id="root"></div>
    <script type="text/babel">
        class ColorChanger extends React.Component {
            state = {
                color: 'red'
            }
            componentDidMount() {
                console.log('Component mounted')
                this.timer = setInterval(() => {
                    this.changeColor()
                }, 500)
            }
            componentWillUnmount() {
                console.log('Component will unmount')
                clearInterval(this.timer)
            }
            changeColor = () => {
                this.setState({ color: this.state.color === 'red' ? 'blue' : 'red' })
            }
            goToDie = () => {
                
            }
            render() {
                return (
                    <div>
                        <h2 style={{ color: this.state.color }}>This text changes color</h2>
                        
                    </div>
                )
            }
        }
        ReactDOM.render(<ColorChanger />, document.getElementById('root'))
        function goToDie() {
            ReactDOM.unmountComponentAtNode(document.getElementById('root'))
        }
    </script>
    <button onclick="javascript:goToDie()">销毁组件</button>
</body>

</html>
